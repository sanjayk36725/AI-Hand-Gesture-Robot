<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Virtual Robot Controller</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#e2e8f0; margin:0; padding:20px; }
    h1 { margin: 0 0 10px; font-size: 22px; }
    .grid { display:grid; grid-template-columns: 420px 1fr; gap:20px; align-items:start; }
    .card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:14px; }
    video, canvas { width:100%; border-radius:10px; background:#000; }
    .row { display:flex; gap:12px; flex-wrap:wrap; margin-top:10px; }
    .pill { background:#1f2937; padding:8px 12px; border-radius:999px; font-weight:600; }
    .ok { color:#22c55e; } .warn { color:#f59e0b; }
    #arena { position:relative; width:100%; height:420px; background:#0b1220; border:1px dashed #334155; border-radius:12px; overflow:hidden; }
    #bot {
      position:absolute; width:42px; height:42px; border-radius:50%;
      background:linear-gradient(135deg,#38bdf8,#2563eb);
      box-shadow:0 0 16px rgba(56,189,248,.45);
      left:190px; top:190px; transform:rotate(0deg);
      transition:transform .12s linear;
    }
    #bot::after{
      content:""; position:absolute; width:8px; height:8px; border-radius:50%;
      background:#fff; top:4px; left:17px;
    }
    .small { font-size:13px; color:#94a3b8; margin-top:8px; line-height:1.4; }
    button{
      background:#2563eb; color:#fff; border:0; border-radius:8px; padding:10px 14px; cursor:pointer; font-weight:600;
    }
    button:hover{ background:#1d4ed8; }
  </style>
</head>
<body>
  <h1>AI Hand Gesture Based Virtual Robot Controller</h1>
  <div class="small">Show one hand clearly in front of camera. Keep good lighting.</div>

  <div class="row" style="margin:12px 0 16px;">
    <button id="startBtn">Start Camera</button>
    <div class="pill">Gesture: <span id="gesture" class="warn">Not Started</span></div>
    <div class="pill">Command: <span id="command" class="warn">STOP</span></div>
    <div class="pill">FPS: <span id="fps">0</span></div>
  </div>

  <div class="grid">
    <div class="card">
      <video id="video" autoplay playsinline></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="card">
      <div id="arena">
        <div id="bot"></div>
      </div>
      <div class="small">
        Controls:<br/>
        • Open Palm → STOP<br/>
        • Fist → FORWARD<br/>
        • Index finger pointing LEFT → LEFT<br/>
        • Index finger pointing RIGHT → RIGHT
      </div>
    </div>
  </div>

  <script type="module">
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const video = document.getElementById("video");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("startBtn");
    const gestureEl = document.getElementById("gesture");
    const commandEl = document.getElementById("command");
    const fpsEl = document.getElementById("fps");
    const bot = document.getElementById("bot");
    const arena = document.getElementById("arena");

    let handLandmarker;
    let running = false;
    let lastTime = performance.now();
    let fps = 0;

    // robot state
    let x = 190, y = 190, angle = 0;
    const speed = 2.6;
    let stableGesture = "NONE";
    let candidateGesture = "NONE";
    let candidateSince = 0;

    function updateBot() {
      const w = arena.clientWidth, h = arena.clientHeight;
      x = Math.max(0, Math.min(w - 42, x));
      y = Math.max(0, Math.min(h - 42, y));
      bot.style.left = `${x}px`;
      bot.style.top = `${y}px`;
      bot.style.transform = `rotate(${angle}deg)`;
    }

    function setCommand(cmd) {
      commandEl.textContent = cmd;
      commandEl.className = "ok";
      if (cmd === "FORWARD") {
        const rad = angle * Math.PI / 180;
        x += Math.cos(rad) * speed;
        y += Math.sin(rad) * speed;
      } else if (cmd === "LEFT") {
        angle -= 4;
      } else if (cmd === "RIGHT") {
        angle += 4;
      }
      updateBot();
    }

    function fingerUp(lm, tip, pip) {
      return lm[tip].y < lm[pip].y; // smaller y = higher on screen
    }

    function detectGesture(lm) {
      const indexUp = fingerUp(lm, 8, 6);
      const middleUp = fingerUp(lm, 12, 10);
      const ringUp = fingerUp(lm, 16, 14);
      const pinkyUp = fingerUp(lm, 20, 18);
      const thumbRight = lm[4].x > lm[3].x;
      const thumbLeft = lm[4].x < lm[3].x;

      // Open palm
      if (indexUp && middleUp && ringUp && pinkyUp) return "OPEN_PALM";
      // Fist
      if (!indexUp && !middleUp && !ringUp && !pinkyUp) return "FIST";
      // Index only + direction
      if (indexUp && !middleUp && !ringUp && !pinkyUp) {
        if (thumbLeft) return "POINT_LEFT";
        if (thumbRight) return "POINT_RIGHT";
      }
      return "UNKNOWN";
    }

    function mapGestureToCommand(g) {
      if (g === "OPEN_PALM") return "STOP";
      if (g === "FIST") return "FORWARD";
      if (g === "POINT_LEFT") return "LEFT";
      if (g === "POINT_RIGHT") return "RIGHT";
      return "STOP";
    }

    function drawLandmarks(lm) {
      // simple points
      for (const p of lm) {
        ctx.beginPath();
        ctx.arc(p.x * canvas.width, p.y * canvas.height, 4, 0, 2 * Math.PI);
        ctx.fillStyle = "#22c55e";
        ctx.fill();
      }
    }

    async function initAI() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        },
        numHands: 1,
        runningMode: "VIDEO"
      });
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
      video.srcObject = stream;
      await video.play();
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
    }

    function processFrame() {
      if (!running) return;

      const now = performance.now();
      const dt = now - lastTime;
      fps = 1000 / dt;
      lastTime = now;
      fpsEl.textContent = fps.toFixed(1);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const res = handLandmarker.detectForVideo(video, now);
      let rawGesture = "NONE";

      if (res.landmarks && res.landmarks.length > 0) {
        const lm = res.landmarks[0];
        drawLandmarks(lm);
        rawGesture = detectGesture(lm);
      }

      // Debounce: gesture must stay for 500ms
      if (rawGesture !== candidateGesture) {
        candidateGesture = rawGesture;
        candidateSince = now;
      } else if (now - candidateSince > 500) {
        stableGesture = candidateGesture;
      }

      gestureEl.textContent = stableGesture;
      gestureEl.className = stableGesture === "UNKNOWN" || stableGesture === "NONE" ? "warn" : "ok";
      const cmd = mapGestureToCommand(stableGesture);
      setCommand(cmd);

      requestAnimationFrame(processFrame);
    }

    startBtn.addEventListener("click", async () => {
      startBtn.disabled = true;
      startBtn.textContent = "Starting...";
      try {
        await initAI();
        await startCamera();
        running = true;
        gestureEl.textContent = "Ready";
        gestureEl.className = "ok";
        startBtn.textContent = "Running";
        processFrame();
      } catch (e) {
        console.error(e);
        alert("Could not start. Please allow camera permission and use HTTPS/localhost.");
        startBtn.disabled = false;
        startBtn.textContent = "Start Camera";
      }
    });

    updateBot();
  </script>
</body>
</html>
